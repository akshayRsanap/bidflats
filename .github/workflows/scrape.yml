name: Daily Property Scrape

on:
  schedule:
    - cron: '30 1 * * *'   # 1:30 AM UTC = 7:00 AM IST
  workflow_dispatch:         # manual trigger button in GitHub Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run IBAPI scraper
        run: |
          python scraper.py \
            --states MH KA DL TN GJ TS WB KL RJ HR \
            --limit 200 \
            --delay 0.5

      - name: Commit updated listings
        run: |
          git config user.name  "BidFlats Bot"
          git config user.email "bot@bidflats.in"
          git add -f properties.json
          git diff --cached --quiet && echo "No changes" || \
            git commit -m "chore: refresh listings $(date -u '+%Y-%m-%d')"
          git push
