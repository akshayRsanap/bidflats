name: Daily Property Scrape

on:
  schedule:
    - cron: "30 1 * * *"   # 1:30 AM UTC = 7:00 AM IST
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run IBAPI scraper
        run: |
          python scraper.py \
            --states MH KA DL TN GJ TS WB KL RJ HR \
            --limit 200 \
            --delay 0.5

      - name: Validate scrape output
        run: |
          COUNT=$(python3 -c "import json; d=json.load(open('properties.json')); print(len(d))")
          echo "Scraped $COUNT properties"
          if [ "$COUNT" -lt 10 ]; then
            echo "ERROR: Only $COUNT properties scraped -- IBAPI likely blocked this IP. Keeping old data."
            git checkout -- properties.json 2>/dev/null || true
            exit 0
          fi
          echo "Scrape OK: $COUNT properties"

      - name: Commit updated listings
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f properties.json
          git diff --cached --quiet && echo "No changes" || \
            git commit -m "chore: refresh listings $(date -u "+%Y-%m-%d")"
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/akshayRsanap/bidflats.git main
